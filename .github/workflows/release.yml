name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Configure release signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$RELEASE_STORE_PASSWORD
          keyAlias=$RELEASE_KEY_ALIAS
          keyPassword=$RELEASE_KEY_PASSWORD
          EOF

      - name: Build debug and signed release APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Prepare release APK filenames
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/Multiwindow Autobrowser debug.apk"
          cp app/build/outputs/apk/release/app-release.apk "release/Multiwindow Autobrowser.apk"
          sha256sum "release/Multiwindow Autobrowser debug.apk" "release/Multiwindow Autobrowser.apk" > release/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Multiwindow Autobrowser ${{ github.ref_name }}
          generate_release_notes: false
          body_path: .github/RELEASE_v1.1.10.md
          files: |
            release/Multiwindow Autobrowser debug.apk
            release/Multiwindow Autobrowser.apk
            release/SHA256SUMS.txt